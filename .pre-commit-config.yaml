# Pre-commit Hooks Configuration — AegisRAG
# Install:  pre-commit install && pre-commit install --hook-type commit-msg
# Run all:  pre-commit run --all-files
# Update:   pre-commit autoupdate
#
# Sprint 126: Cleaned up — removed redundant hooks (Black, isort), fixed missing scripts,
# added TypeScript check, updated to Python 3.12

repos:
  # ──────────────────────────────────────────────
  # 1. RUFF — Linting + Formatting (replaces Black, isort, Flake8)
  # ──────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.8
    hooks:
      - id: ruff
        name: "Ruff Linter"
        args: [--fix, --exit-non-zero-on-fix, --config=pyproject.toml]
      - id: ruff-format
        name: "Ruff Formatter"
        args: [--config=pyproject.toml]

  # ──────────────────────────────────────────────
  # 2. SECRET DETECTION — Prevent API keys, passwords in commits
  # ──────────────────────────────────────────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: "Secret Detection"
        args: [--baseline, .secrets.baseline]
        exclude: |
          (?x)^(
            \.env\.template|
            tests/.*|
            .*\.example|
            docs/.*
          )$

  # ──────────────────────────────────────────────
  # 3. TYPESCRIPT CHECK — Catch compile errors in frontend
  # ──────────────────────────────────────────────
  - repo: local
    hooks:
      - id: tsc-check
        name: "TypeScript Check"
        entry: bash -c 'cd frontend && npx tsc --noEmit --pretty 2>&1 | head -30'
        language: system
        files: ^frontend/.*\.(ts|tsx)$
        pass_filenames: false

  # ──────────────────────────────────────────────
  # 4. YAML / JSON / TOML Validation + File Checks
  # ──────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        name: "YAML Syntax"
        args: [--unsafe]
      - id: check-json
        name: "JSON Syntax"
        exclude: ^frontend/tsconfig\.
      - id: check-toml
        name: "TOML Syntax"
      - id: check-added-large-files
        name: "Large Files (>1MB)"
        args: [--maxkb=1000]
      - id: check-merge-conflict
        name: "Merge Conflict Markers"
      - id: trailing-whitespace
        name: "Trailing Whitespace"
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
        name: "End of File Newline"

  # ──────────────────────────────────────────────
  # 5. SECURITY — Bandit static analysis
  # ──────────────────────────────────────────────
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        name: "Bandit Security"
        args: [-c, pyproject.toml]
        types: [python]
        exclude: |
          (?x)^(
            tests/.*|
            scripts/.*|
            examples/.*|
            docs/.*
          )$

  # ──────────────────────────────────────────────
  # 6. NAMING CONVENTIONS (Custom — Sprint 18)
  # ──────────────────────────────────────────────
  - repo: local
    hooks:
      - id: check-naming-conventions
        name: "Naming Conventions"
        entry: python3 scripts/check_naming.py
        language: system
        types: [python]
        pass_filenames: true

  # ──────────────────────────────────────────────
  # 7. COMMIT MESSAGE — Conventional Commits
  # ──────────────────────────────────────────────
  # Note: conventional-pre-commit v4.x has an argparse bug with pre-commit 4.5.0
  # where the commit-msg file isn't forwarded. Using a local hook instead.
  - repo: local
    hooks:
      - id: conventional-commit
        name: "Conventional Commit Message"
        entry: python3 scripts/check_conventional_commit.py
        language: system
        stages: [commit-msg]
        always_run: true
        pass_filenames: false

# ──────────────────────────────────────────────
# Global Configuration
# ──────────────────────────────────────────────

default_language_version:
  python: python3.12

exclude: |
  (?x)^(
    \.venv/.*|
    \.git/.*|
    \.mypy_cache/.*|
    \.pytest_cache/.*|
    \.ruff_cache/.*|
    __pycache__/.*|
    node_modules/.*|
    models/.*|
    \.env$|
    \.env\..*
  )$

fail_fast: false
minimum_pre_commit_version: "3.0.0"
